info:
  name: Register oauth client
  type: http
  seq: 2

http:
  method: POST
  url: "{{BASE_URL}}/register-oauth-client"
  body:
    type: json
    data: |-
      {
        "name": "clientB",
        "redirectUris": ["http://localhost:5002/callback"],
        "tokenEndpointAuthMethod": "client_secret_post",
        "allowedScopes": ["openid", "email"],
        "grantTypes": ["authorization_code", "refresh_token"]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
